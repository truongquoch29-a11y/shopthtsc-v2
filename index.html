<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>THTSCShop - Bảo trì hệ thống</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
color:white;
}

/* khung chính */

.container{
text-align:center;
padding:40px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(14px);
border:1px solid rgba(255,255,255,0.12);
box-shadow:0 0 50px rgba(0,0,0,0.6);
max-width:500px;
width:90%;
}

/* logo */

.logo img{
width:80px;
height:80px;
border-radius:50%;
margin-bottom:15px;
object-fit:cover;
}

/* tiêu đề */

h1{
font-size:32px;
margin-bottom:10px;
letter-spacing:1px;
}

h2{
font-size:22px;
margin-bottom:15px;
font-weight:500;
}

p{
opacity:0.85;
line-height:1.5;
margin-bottom:25px;
}

/* icon bánh răng */

.gears{
font-size:40px;
margin-bottom:20px;
opacity:0.9;
}

.gears i{
margin:0 10px;
}

/* footer */

.footer{
margin-top:20px;
font-size:14px;
opacity:0.8;
}

.footer a{
color:white;
margin:0 10px;
font-size:20px;
text-decoration:none;
}

/* popup */

.popup{
position:fixed;
bottom:20px;
right:20px;
background:#111827;
border:1px solid rgba(255,255,255,0.15);
padding:12px 18px;
border-radius:12px;
display:flex;
align-items:center;
gap:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
font-size:14px;
}

.popup i{
font-size:18px;
color:#60a5fa;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
<img src="logo.png">
</div>

<h1>THTSCSHOP</h1>
<h2>Hệ thống đang bảo trì</h2>

<p>Website đang được nâng cấp để mang lại trải nghiệm tốt hơn. Vui lòng quay lại sau.</p>

<div class="gears">
<i class="fa-solid fa-gear"></i>
<i class="fa-solid fa-gear"></i>
</div>

<div class="footer">

<div style="margin-bottom:8px;">© 2026 THTSCShop</div>

<a href="https://facebook.com" target="_blank">
<i class="fa-brands fa-facebook"></i>
</a>

<a href="https://zalo.me" target="_blank">
<i class="fa-solid fa-comment"></i>
</a>

</div>

</div>

<div class="popup">
<i class="fa-solid fa-circle-info"></i>
<span>Shop đang bảo trì, hãy liên hệ hỗ trợ</span>
</div>

</body>
</html>
