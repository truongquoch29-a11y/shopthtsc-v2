<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THTSCSHOP - Hoàn tất bảo trì</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(0,255,255,0.08) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: moveBg 20s linear infinite;
}

@keyframes moveBg {
    from {transform: translate(0,0);}
    to {transform: translate(-200px,-200px);}
}

.container {
    text-align: center;
    z-index: 2;
}

/* LOGO */
.logo-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    margin-bottom: 15px;
    animation: float 3s infinite ease-in-out;
}

.logo-img {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #00ffcc;
    box-shadow: 0 0 15px #00ffcc;
    animation: spin 8s linear infinite, glowLogo 2s infinite alternate;
}

.shop-name {
    font-size: 26px;
    font-weight: bold;
    letter-spacing: 2px;
}

h1 {
    font-size: 22px;
    animation: fadeInUp 1s ease;
    color: #00ffcc;
}

/* NÚT LINK */
.btn {
    margin-top: 20px;
    display: inline-block;
    padding: 12px 20px;
    background: linear-gradient(135deg, #00ffcc, #00ccff);
    color: black;
    border-radius: 8px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.08);
    box-shadow: 0 0 15px #00ffcc;
}

/* POPUP */
.popup {
    position: fixed;
    top: 20px;
    right: 20px;
    background: linear-gradient(135deg, #111, #222);
    padding: 15px 18px;
    border-radius: 12px;
    display: flex;
    gap: 12px;
    align-items: center;
    box-shadow: 0 0 20px rgba(0,255,150,0.4);
    animation: slideIn 0.5s ease, glow 2s infinite alternate;
}

.popup i {
    font-size: 18px;
    color: #00ff88;
}

/* ANIMATION */
@keyframes slideIn {
    from {transform: translateX(120px); opacity: 0;}
    to {transform: translateX(0); opacity: 1;}
}

@keyframes fadeOut {
    to {opacity: 0; transform: translateX(120px);}
}

@keyframes fadeInUp {
    from {opacity: 0; transform: translateY(25px);}
    to {opacity: 1; transform: translateY(0);}
}

@keyframes float {
    0%,100% {transform: translateY(0);}
    50% {transform: translateY(-10px);}
}

@keyframes spin {
    from {transform: rotate(0deg);}
    to {transform: rotate(360deg);}
}

@keyframes glowLogo {
    from {box-shadow: 0 0 10px #00ffcc;}
    to {box-shadow: 0 0 25px #00ffcc;}
}

@keyframes glow {
    from {box-shadow: 0 0 10px rgba(0,255,150,0.2);}
    to {box-shadow: 0 0 25px rgba(0,255,150,0.6);}
}
</style>
</head>

<body>

<div class="container">
    <div class="logo-box">
        <img src="images/circle_logo.png" class="logo-img">
        <div class="shop-name">THTSCSHOP</div>
    </div>

    <h1><i class="fas fa-circle-check"></i> Bảo trì hoàn tất</h1>
    <p>Shop đã nâng cấp và chuyển sang địa chỉ mới.</p>
    <p>Nhấn nút bên dưới để truy cập ngay.</p>

    <!-- GẮN LINK SHOP MỚI Ở ĐÂY -->
    <a href="https://thtscshop-v3.pages.dev" class="btn">Truy cập shop mới</a>
</div>

<div class="popup" id="popup">
    <i class="fas fa-circle-check"></i>
    <span>Shop đã hoạt động trở lại tại địa chỉ mới</span>
</div>

<script>
setTimeout(() => {
    document.getElementById("popup").style.animation = "fadeOut 0.6s forwards";
}, 4000);
</script>

</body>
</html>
