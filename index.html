<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THTSCShop - Bảo trì hệ thống</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e293b,#020617);
color:white;
overflow:hidden;
}

/* hiệu ứng nền */
.background{
position:absolute;
width:100%;
height:100%;
overflow:hidden;
z-index:0;
}

.background span{
position:absolute;
display:block;
width:4px;
height:4px;
background:white;
border-radius:50%;
animation:move 10s linear infinite;
opacity:0.4;
}

@keyframes move{
0%{
transform:translateY(100vh) scale(0);
}
100%{
transform:translateY(-10vh) scale(1);
}
}

/* khung chính */
.container{
position:relative;
z-index:1;
text-align:center;
padding:40px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 0 40px rgba(0,0,0,0.5);
max-width:500px;
}

/* logo */
.logo{
font-size:40px;
font-weight:bold;
letter-spacing:2px;
margin-bottom:10px;
}

/* tiêu đề */
h1{
font-size:26px;
margin-bottom:15px;
}

/* mô tả */
p{
opacity:0.8;
margin-bottom:30px;
}

/* animation bánh răng */
.loader{
display:flex;
justify-content:center;
gap:20px;
}

.gear{
width:40px;
height:40px;
border:4px solid white;
border-radius:50%;
border-top:4px solid transparent;
animation:spin 1.5s linear infinite;
}

.gear:nth-child(2){
animation-direction:reverse;
animation-duration:2s;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

/* footer */
.footer{
margin-top:25px;
font-size:14px;
opacity:0.6;
}
</style>

</head>

<body>

<div class="background">
<span style="left:10%;animation-delay:0s"></span>
<span style="left:20%;animation-delay:2s"></span>
<span style="left:30%;animation-delay:4s"></span>
<span style="left:40%;animation-delay:1s"></span>
<span style="left:50%;animation-delay:3s"></span>
<span style="left:60%;animation-delay:5s"></span>
<span style="left:70%;animation-delay:2s"></span>
<span style="left:80%;animation-delay:4s"></span>
<span style="left:90%;animation-delay:1s"></span>
</div>

<div class="container">

<div class="logo">THTSCSHOP</div>

<h1>Hệ thống đang bảo trì</h1>

<p>Website đang được nâng cấp để mang lại trải nghiệm tốt hơn. Vui lòng quay lại sau.</p>

<div class="loader">
<div class="gear"></div>
<div class="gear"></div>
</div>

<div class="footer">
© 2026 THTSCShop
</div>

</div>

</body>
</html>
